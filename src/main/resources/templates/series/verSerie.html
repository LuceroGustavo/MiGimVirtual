<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Serie</title>
    <!-- Responsive: 1 col móvil, 2 tablet, 3 desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/footer.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .serie-container {
            padding: 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Serie: mismo estilo que rutinas (captura3) */
        .hoja-serie {
            border: 3px solid #f97316;
            border-radius: 10px;
            padding: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .hoja-serie-titulo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: linear-gradient(135deg, #21262d 0%, #161b22 100%);
            color: #c9d1d9;
            padding: 0.6rem 0.9rem;
            font-weight: 700;
            font-size: 1.6rem;
            border-radius: 6px;
            margin-bottom: 0.75rem;
            border: 1px solid #30363d;
        }
        .hoja-serie-titulo-punto {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f97316;
            flex-shrink: 0;
        }
        .hoja-serie-vueltas {
            margin-left: auto;
            color: #7ee787;
            font-weight: 700;
            font-size: 1.5rem;
            white-space: nowrap;
        }
        .hoja-serie-desc {
            color: #8b949e;
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }
        /* Grid responsive: 1 col móvil, 2 tablet, 3 desktop */
        .ejercicios-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        @media (min-width: 576px) {
            .ejercicios-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 992px) {
            .ejercicios-grid { grid-template-columns: repeat(3, 1fr); }
        }
        .sala-item-wrap {
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
        }
        .sala-item-wrap .item-titulo {
            background: #000;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 0.5rem 0.6rem;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sala-item-wrap .sala-item {
            position: relative;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            border: 1px solid #30363d;
            border-top: none;
            background: #fff;
            min-height: 220px;
            height: 240px;
        }
        .sala-item-wrap .item-imagen-wrap {
            position: absolute;
            inset: 0;
            background: #fff;
        }
        .sala-item-wrap .item-imagen-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
        }
        /* Peso arriba derecha, reps abajo - achicados para escritorio */
        .sala-item-wrap .item-datos {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: auto;
            min-width: 2.2rem;
            max-width: 35%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0.35rem;
            pointer-events: none;
            z-index: 2;
        }
        .sala-item-wrap .item-imagen-wrap { z-index: 0; }
        .sala-item-wrap .item-peso,
        .sala-item-wrap .item-reps {
            font-size: 0.85rem;
            font-weight: 700;
            color: #7ee787;
            padding: 0.25rem 0.45rem;
            text-align: right;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 6px;
            width: fit-content;
            min-height: 1.4em;
            align-self: flex-end;
            flex-shrink: 0;
        }
        .sala-item-wrap .item-reps { margin-top: auto; }
        .badge-ejercicios {
            margin-left: 0.5rem;
            font-size: 0.9rem;
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }
        /* Responsive móvil (≤991px) */
        @media (max-width: 991px) {
            .serie-container { padding: 0.75rem; }
            .hoja-serie { padding: 0.5rem; margin-bottom: 1rem; }
            .hoja-serie-titulo {
                flex-wrap: wrap;
                font-size: 1.25rem;
                padding: 0.5rem 0.7rem;
            }
            .hoja-serie-vueltas { font-size: 1.2rem; }
            .hoja-serie-desc { font-size: 0.9rem; }
            .sala-item-wrap .item-titulo { font-size: 1.05rem; }
            .sala-item-wrap .sala-item {
                min-height: 180px;
                height: 200px;
            }
        }
        @media (max-width: 575px) {
            .serie-container { padding: 0.5rem; }
            .hoja-serie-titulo { font-size: 1.1rem; }
            .hoja-serie-vueltas { font-size: 1rem; }
            .badge-ejercicios { font-size: 0.8rem; margin-left: 0.35rem; }
            .sala-item-wrap .sala-item {
                min-height: 160px;
                height: 180px;
            }
        }
        /* Flecha volver: solo móvil, vuelve al panel del profesor */
        .btn-volver-serie { display: none; }
        @media (max-width: 991px) {
            .btn-volver-serie {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.5rem 0.9rem;
                margin-bottom: 0.75rem;
                background: #21262d;
                color: #e6edf3;
                border: 1px solid #30363d;
                border-radius: 8px;
                font-size: 0.95rem;
                text-decoration: none;
            }
            .btn-volver-serie:hover { background: #30363d; color: #e6edf3; }
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="serie-container py-4">
    <a th:if="${volver != null && !#strings.isEmpty(volver)}" th:href="${volver}" class="btn-volver-serie"><i class="fas fa-arrow-left"></i> Volver</a>
    <a th:unless="${volver != null && !#strings.isEmpty(volver)}" th:href="@{/profesor/dashboard}" class="btn-volver-serie"><i class="fas fa-arrow-left"></i> Volver al panel</a>
    <div class="hoja-serie">
        <div class="hoja-serie-titulo">
            <span class="hoja-serie-titulo-punto"></span>
            <span th:text="${serie.nombre}">Nombre Serie</span>
            <span class="hoja-serie-vueltas" th:if="${serie.repeticionesSerie != null && serie.repeticionesSerie >= 1}" th:text="|x${serie.repeticionesSerie} vueltas|">x1 vueltas</span>
            <span class="badge badge-ejercicios" th:text="${#lists.size(serie.serieEjercicios)} + ' ejercicios'">3 ejercicios</span>
        </div>
        <div class="hoja-serie-desc" th:if="${serie.descripcion != null && !serie.descripcion.isEmpty()}" th:text="${serie.descripcion}">Descripción</div>
        <div class="ejercicios-grid">
            <div th:each="serieEjercicio : ${serie.serieEjercicios}" class="sala-item-wrap"
                 th:with="repsDisplay=${serieEjercicio.valor != null ? (serieEjercicio.valor + ' ' + (serieEjercicio.unidad == null or #strings.toLowerCase(serieEjercicio.unidad) == 'reps' ? 'rep.' : #strings.toLowerCase(serieEjercicio.unidad) == 'min' ? 'min' : #strings.toLowerCase(serieEjercicio.unidad) == 'seg' or #strings.toLowerCase(serieEjercicio.unidad) == 's' ? 'seg' : (serieEjercicio.unidad != null ? serieEjercicio.unidad : 'rep.'))) : '—'}">
                <div class="item-titulo" th:text="${serieEjercicio.exercise.name}">Ejercicio</div>
                <div class="sala-item">
                    <div class="item-imagen-wrap">
                        <img th:if="${serieEjercicio.exercise.imagen != null}" th:src="${serieEjercicio.exercise.imagen.url}" alt="">
                        <img th:if="${serieEjercicio.exercise.imagen == null}" src="/img/not_imagen.png" alt="">
                    </div>
                    <div class="item-datos">
                        <div class="item-peso" th:if="${serieEjercicio.peso != null}" th:text="${serieEjercicio.peso} + ' kg'">25 kg</div>
                        <div class="item-peso" th:if="${serieEjercicio.peso == null}">Sin peso</div>
                        <div class="item-reps" th:text="${repsDisplay}">—</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:replace="fragments/footer :: footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
