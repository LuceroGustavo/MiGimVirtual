<!-- fragments/navbar.html - MiGymVirtual. Fragmento navbar = barra + modal salida + script (todo junto para th:replace). -->
<th:block th:fragment="navbar" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity">
<nav class="navbar navbar-expand-lg navbar-matt shadow-sm"
     style="background-image: url('/img/fondo-navbar.png'); background-size: cover; background-position: center; background-color: #e0e0e0;">
    <style>
        .navbar-matt .navbar-brand span, .navbar-matt .text-navbar { color: #000 !important; }
        .navbar-matt .btn-outline-navbar { border-color: #333; color: #000 !important; }
        .navbar-matt .btn-outline-navbar:hover { background: rgba(0,0,0,0.08); color: #000 !important; border-color: #000; }
        .navbar-matt .navbar-brand { padding-top: 0.05rem; padding-bottom: 0.05rem; }
        .navbar-matt .navbar-brand .logo-circle { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; margin: 0; }
        /* Móvil: menos margen alrededor del logo para que se vea más grande sin crecer la barra */
        @media (max-width: 991px) {
            .navbar-matt .container-fluid { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; padding-left: 0.5rem !important; padding-right: 0.5rem !important; }
            .navbar-matt .navbar-volver, .navbar-matt .navbar-panel, .navbar-matt .navbar-email, .navbar-matt .navbar-avatar { display: none !important; }
            .navbar-matt .navbar-brand { padding-top: 0.05rem; padding-bottom: 0.05rem; }
            .navbar-matt .navbar-brand .logo-circle { width: 46px; height: 46px; margin: 0; }
            .navbar-matt .navbar-brand span { font-size: 1rem !important; }
            .navbar-matt .navbar-brand.me-2 { margin-right: 0.35rem !important; }
            .navbar-matt .navbar-name-mobile { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.9rem; font-weight: 600; }
            .navbar-matt .navbar-envelope-mobile { padding: 0.35rem 0.5rem !important; font-size: 1rem; }
            .navbar-matt .btn-logout-mobile { padding: 0.35rem 0.6rem !important; font-size: 0.85rem; }
        }
        @media (min-width: 992px) {
            .navbar-matt .navbar-name-mobile { display: none !important; }
        }
    </style>
    <div class="container-fluid">
        <!-- Logo + MiGymVirtual: con sesión profesor lleva al panel; sino a inicio -->
        <a class="navbar-brand d-flex align-items-center me-2"
           th:href="${(#authentication.principal != null and #authentication.principal.rol != null and (#authentication.principal.rol == 'ADMIN' or #authentication.principal.rol == 'AYUDANTE' or #authentication.principal.rol == 'DEVELOPER')) ? '/profesor/dashboard' : '/'}">
            <img th:src="@{/img/mgvirtual_logo1.png}" alt="Logo MiGymVirtual" class="logo-circle me-2" src="/img/mgvirtual_logo1.png" onerror="this.src='/img/not_imagen.png'">
            <span class="fw-bold h4 mb-0">MiGymVirtual</span>
        </a>

        <a href="javascript:history.back()" class="btn btn-outline-navbar ms-3 navbar-volver"><i class="fas fa-arrow-left"></i> Volver</a>

        <div class="ms-auto d-flex align-items-center">
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center"
                 th:with="currentUser=${#authentication.principal}">

                <a th:if="${currentUser.rol == 'ADMIN' or currentUser.rol == 'AYUDANTE' or currentUser.rol == 'DEVELOPER'}" th:href="@{/profesor/dashboard}" class="btn btn-outline-navbar me-3 navbar-panel">
                    <i class="fas fa-tachometer-alt me-1"></i> Ir a mi Panel
                </a>
                <a th:if="${currentUser.rol == 'ADMIN' or currentUser.rol == 'DEVELOPER'}" th:href="@{/profesor/pagina-publica}" class="btn btn-outline-navbar me-3 position-relative navbar-envelope-mobile" data-mgv-salida="consultas-nav" title="Consultas recibidas">
                    <i class="fas fa-envelope"></i>
                    <span th:if="${cantidadConsultas != null && cantidadConsultas > 0}" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" th:text="${cantidadConsultas}">0</span>
                </a>
                <span class="navbar-name-mobile text-navbar ms-2" th:text="${currentUser.nombre}" title="Usuario">Nombre</span>
                <div class="text-end me-3 text-navbar navbar-email">
                    <div class="fw-bold" th:text="${currentUser.nombre}">Nombre</div>
                    <small class="text-muted" th:text="${currentUser.correo}">usuario@correo.com</small>
                </div>
                <img th:src="${currentUser.avatar != null and !#strings.isEmpty(currentUser.avatar) and currentUser.avatar != 'null' and currentUser.avatar != '/img/not_imagen.png' ? currentUser.avatar : '/img/avatar1.png'}"
                     alt="Avatar" style="width: 45px; height: 45px;" class="rounded-circle border border-secondary navbar-avatar"
                     onerror="this.src='/img/avatar1.png'">
                <a th:href="@{/logout}" class="btn btn-danger ms-3 btn-logout-mobile" data-mgv-salida="logout">Salir</a>
            </div>

            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/login}" class="btn btn-dark fw-bold">
                    <i class="fas fa-sign-in-alt me-1"></i> Iniciar sesión
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- Modal confirmación salida (móvil ≤991px, entorno 2) — mismo estilo que modales del panel -->
<div class="modal fade" id="modalMgvConfirmSalida" tabindex="-1" aria-labelledby="modalMgvConfirmSalidaTitulo" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header modal-confirmar-header">
                <h5 class="modal-title" id="modalMgvConfirmSalidaTitulo"><i class="fas fa-question-circle me-2"></i>Confirmar</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body text-muted" id="modalMgvConfirmSalidaBody"></div>
            <div class="modal-footer modal-confirmar-footer d-flex gap-2 justify-content-end flex-wrap">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" id="modalMgvConfirmSalidaCancel">Cancelar</button>
                <button type="button" class="btn btn-primary" id="modalMgvConfirmSalidaBtn">Aceptar</button>
            </div>
        </div>
    </div>
</div>
<style>
    /* Fallback si la página no carga style.css (p. ej. manual embebido): gradiente Mattfuncional */
    #modalMgvConfirmSalida .modal-confirmar-header {
        background: linear-gradient(135deg, #5e35b1 0%, #7e57c2 100%) !important;
        color: #fff !important;
        border-radius: 0.5rem 0.5rem 0 0;
    }
    #modalMgvConfirmSalida .modal-confirmar-header .btn-close { filter: brightness(0) invert(1); }
    #modalMgvConfirmSalida .modal-confirmar-footer .btn-primary {
        background: linear-gradient(135deg, #5e35b1, #7e57c2);
        border: none;
    }
</style>
<script th:src="@{/js/mgv-salida-movil.js}" defer></script>
</th:block>
