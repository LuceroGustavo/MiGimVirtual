<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rutina no encontrada - MiGymVirtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 420px; }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="card p-4">
            <i class="fas fa-link-slash fa-3x text-muted mb-3"></i>
            <h4 class="mb-2">Enlace no válido</h4>
            <p class="text-muted mb-4" th:text="${mensajeError != null ? mensajeError : 'El enlace de la rutina no es válido o ha expirado.'}">El enlace de la rutina no es válido o ha expirado.</p>
            <a href="/" class="btn btn-primary"><i class="fas fa-home me-2"></i>Ir al inicio</a>
        </div>
    </div>
</body>
</html>
