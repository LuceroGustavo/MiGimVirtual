<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Ejercicio - Panel del Profesor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/style.css" rel="stylesheet">
    <link href="/css/footer.css" rel="stylesheet">
    <style>
        /* Paleta módulo Ejercicios: pastel #ffccbc / #ffab91, acento #bf360c — ver PALETA_COLORES.md */
        body {
            background: linear-gradient(135deg, #ffccbc 0%, #ffe0b2 45%, #ffab91 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        .main-container {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(191, 54, 12, 0.12);
            margin: 12px auto 24px;
            padding: 1rem 0.75rem 1.5rem;
            max-width: 900px;
        }
        @media (min-width: 768px) {
            .main-container { margin: 20px auto 32px; padding: 1.5rem 2rem 2rem; }
        }
        .form-title {
            color: #bf360c;
            font-weight: 700;
            text-align: center;
            font-size: clamp(1.35rem, 4vw, 2rem);
            margin-bottom: 0.75rem;
        }
        .btn-volver-ej {
            background: #eceff1;
            color: #455a64;
            border: 1px solid #b0bec5;
            font-weight: 600;
            border-radius: 0.75rem;
            padding: 0.5rem 1rem;
        }
        .btn-volver-ej:hover { background: #cfd8dc; color: #37474f; }
        .form-section {
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(191, 54, 12, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .card-header-ejercicio {
            background: linear-gradient(135deg, #ff8a65 0%, #bf360c 100%);
            color: #fff;
            padding: 0.85rem 1rem;
            font-size: clamp(1rem, 2.5vw, 1.15rem);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (min-width: 576px) {
            .card-header-ejercicio { padding: 0.9rem 1.25rem; }
        }
        .form-container { padding: 1.25rem 0.85rem 1.5rem; }
        @media (min-width: 576px) {
            .form-container { padding: 1.75rem 1.5rem 2rem; }
        }
        .btn-guardar-ejercicio {
            background: linear-gradient(135deg, #ff7043 0%, #bf360c 100%);
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            padding: 0.65rem 1.5rem;
        }
        .btn-guardar-ejercicio:hover { color: #fff; filter: brightness(1.05); }
        .btn-cancelar-ej {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.65rem 1.25rem;
        }
        .form-label { font-weight: 600; color: #4e342e; }
        .form-label i { color: #bf360c; }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #ffe0b2;
            padding: 0.6rem 0.9rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #ff7043;
            box-shadow: 0 0 0 0.2rem rgba(255, 112, 67, 0.25);
        }
        .form-check-input:checked {
            background-color: #bf360c;
            border-color: #bf360c;
        }
        .btn-outline-grupo {
            color: #bf360c;
            border-color: #ffab91;
            background: #fff8f5;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-outline-grupo:hover {
            background: #ffccbc;
            color: #bf360c;
            border-color: #ff7043;
        }
        .image-preview {
            max-width: min(100%, 280px);
            max-height: 220px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(191, 54, 12, 0.15);
            border: 2px solid #ffe0b2;
        }
        .grupos-check-wrap {
            background: linear-gradient(180deg, #fff8f5 0%, #fff 100%);
            border: 1px solid #ffe0b2;
            border-radius: 12px;
            padding: 0.75rem 0.5rem;
        }
        @media (min-width: 576px) {
            .grupos-check-wrap { padding: 1rem 1rem; }
        }
        /* Entorno 2: 2 columnas en móvil — etiquetas compactas para que entren bien */
        @media (max-width: 575px) {
            .grupos-check-wrap .form-check { padding-left: 1.35rem; margin-bottom: 0.35rem; }
            .grupos-check-wrap .form-check-input { margin-left: -1.35rem; }
            .grupos-check-wrap .form-check-label { font-size: 0.85rem; line-height: 1.25; word-break: break-word; }
        }
        .bottom-nav-mobile {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            color: #ecf0f1;
            padding: 0.5rem 0 0.6rem;
            padding-bottom: max(0.6rem, env(safe-area-inset-bottom));
            box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
            z-index: 1030;
        }
        @media (max-width: 991px) {
            .bottom-nav-mobile { display: flex !important; justify-content: space-around; align-items: center; }
            .page-ej-nuevo { padding-bottom: 5rem !important; }
        }
        @media (min-width: 992px) {
            .bottom-nav-mobile { display: none !important; }
        }
        .bottom-nav-mobile a {
            color: #bdc3c7;
            text-decoration: none;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }
        .bottom-nav-mobile a:hover, .bottom-nav-mobile a:focus { color: #fff; }
        .bottom-nav-mobile a i { font-size: 1.25rem; }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid px-2 px-md-3 page-ej-nuevo">
    <div class="main-container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center gap-2 mb-3">
            <a th:href="@{/profesor/mis-ejercicios}" class="btn btn-volver-ej align-self-start">
                <i class="fas fa-arrow-left me-1"></i>Volver a Ejercicios
            </a>
        </div>
        <h1 class="form-title">
            <i class="fas fa-plus-circle me-2"></i>Nuevo Ejercicio
        </h1>
        <p class="text-center text-muted small mb-4 px-1" th:if="${profesor != null}">
            <span th:text="'Podés crear un ejercicio nuevo, ' + ${profesor.nombre} + '.'"></span>
        </p>
        <p class="text-center text-muted small mb-4 px-1" th:if="${profesor == null}">Completá los datos del ejercicio.</p>

        <div class="form-section">
            <div class="card-header-ejercicio">
                <i class="fas fa-dumbbell"></i>
                <span>Datos del ejercicio</span>
            </div>
            <div class="form-container">
                <form th:action="@{/profesor/mis-ejercicios/nuevo}" th:object="${exercise}" method="post" enctype="multipart/form-data">

                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">
                            <i class="fas fa-signature me-1"></i>Nombre del ejercicio
                        </label>
                        <input type="text" class="form-control" id="name" th:field="*{name}"
                               placeholder="Ej: Press de banca, Sentadillas…" required>
                        <div th:if="${#fields.hasErrors('name')}" class="text-danger mt-1 small" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="type" class="form-label">
                            <i class="fas fa-tag me-1"></i>Tipo
                        </label>
                        <input type="text" class="form-control" id="type" th:field="*{type}"
                               placeholder="Ej: Tríceps, Bíceps, Cuádriceps…">
                        <div class="form-text">Subcategoría del grupo muscular (ej. Tríceps para BRAZOS).</div>
                        <div th:if="${#fields.hasErrors('type')}" class="text-danger mt-1 small" th:errors="*{type}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">
                            <i class="fas fa-align-left me-1"></i>Descripción
                        </label>
                        <textarea class="form-control" id="description" th:field="*{description}" rows="4"
                                  placeholder="Cómo realizarlo, qué músculos trabaja…" required></textarea>
                        <div th:if="${#fields.hasErrors('description')}" class="text-danger mt-1 small" th:errors="*{description}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="videoUrl" class="form-label">
                            <i class="fas fa-video me-1"></i>URL del video <span class="fw-normal text-muted">(opcional)</span>
                        </label>
                        <input type="url" class="form-control" id="videoUrl" th:field="*{videoUrl}"
                               placeholder="https://www.youtube.com/watch?v=…">
                        <div class="form-text">YouTube u otra plataforma.</div>
                        <div th:if="${#fields.hasErrors('videoUrl')}" class="text-danger mt-1 small" th:errors="*{videoUrl}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label d-block mb-2">
                            <i class="fas fa-layer-group me-1"></i>Grupos musculares
                        </label>
                        <div class="grupos-check-wrap">
                            <div class="row g-2">
                                <div th:each="grupo : ${gruposMusculares}" class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                               th:value="${grupo.id}"
                                               th:name="grupoIds"
                                               th:id="${'grupo-' + grupo.id}">
                                        <label class="form-check-label" th:for="${'grupo-' + grupo.id}" th:text="${grupo.nombre}">Grupo</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-text mt-2">Marcá todos los grupos que trabaja este ejercicio.</div>
                        <div class="mt-2">
                            <a th:href="@{/profesor/mis-grupos-musculares(returnUrl='/profesor/mis-ejercicios/nuevo')}" class="btn btn-outline-grupo btn-sm">
                                <i class="fas fa-plus me-1"></i>Crear grupo muscular
                            </a>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="image" class="form-label">
                            <i class="fas fa-image me-1"></i>Imagen del ejercicio
                        </label>
                        <input type="file" class="form-control" id="image" name="image"
                               accept="image/*" onchange="previewImage(this)">
                        <div class="form-text">JPG, PNG o GIF. Máx. 5 MB.</div>
                        <div id="imagePreview" class="mt-3" style="display: none;">
                            <img id="preview" class="image-preview img-fluid" alt="Vista previa">
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-2 justify-content-stretch justify-content-sm-between pt-2 border-top border-light">
                        <a th:href="@{/profesor/mis-ejercicios}" class="btn btn-outline-secondary btn-cancelar-ej order-2 order-sm-1 text-center">
                            <i class="fas fa-times me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-guardar-ejercicio order-1 order-sm-2 flex-grow-1 flex-sm-grow-0">
                            <i class="fas fa-save me-2"></i>Guardar ejercicio
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/bottom-nav :: bottom-nav}"></div>
<div th:replace="fragments/footer :: footer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function previewImage(input) {
        var preview = document.getElementById('preview');
        var previewContainer = document.getElementById('imagePreview');
        if (!preview || !previewContainer) return;
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                previewContainer.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        } else {
            previewContainer.style.display = 'none';
        }
    }
</script>
</body>
</html>
