# Configuración para servidor Donweb (detodoya.com / mismo VPS)
# Perfil: --spring.profiles.active=donweb

spring.application.name=MiGymVirtual

# Escuchar en todas las interfaces para acceso externo
server.port=8081
server.address=0.0.0.0

# Nginx termina HTTPS y reenvía a :8081: el request debe reflejar esquema/host públicos (og:image, WhatsApp).
server.forward-headers-strategy=framework
# URL absoluta HTTPS para og:image / WhatsApp (evita http://…:8081 si fallan X-Forwarded-*).
# Sobrescribir: export MIGIMVIRTUAL_PUBLIC_BASE_URL=https://otro-dominio.com (sin barra final)
migimvirtual.public-base-url=${MIGIMVIRTUAL_PUBLIC_BASE_URL:https://migimvirtual.detodoya.com.ar}

# Base de datos (createDatabaseIfNotExist + ddl-auto=update: BD y tablas se crean al arrancar)
spring.datasource.url=jdbc:mysql://localhost:3306/migimvirtual?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MIGIMVIRTUAL_DB_USER:migimvirtual_user}
spring.datasource.password=${MIGIMVIRTUAL_DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.org.springframework.web=WARN
logging.level.com.migimvirtual=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Archivos subidos (ruta en servidor - crear directorio si no existe: mkdir -p /root/migimvirtual/uploads)
migimvirtual.uploads.dir=/root/migimvirtual/uploads
migimvirtual.uploads.ejercicios=ejercicios
migimvirtual.uploads.base-url=/img

# Producción: sin stacktrace en errores
server.error.include-stacktrace=never
server.error.include-message=never

# DevTools desactivado en servidor
spring.devtools.restart.enabled=false
